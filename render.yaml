services:
  - type: web
    name: macau-invitation-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: SENDER_EMAIL
        value: houhonuhh@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: FLASK_DEBUG
        value: "0"
